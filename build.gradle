plugins {
    id 'java'
}

group 'org.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.testng:testng:7.10.2'
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.25.0'
    testImplementation 'io.github.bonigarcia:webdrivermanager:5.9.2'
}

configurations.all {
    resolutionStrategy {
        force 'org.seleniumhq.selenium:selenium-java:4.25.0'
    }
}


test {
    useTestNG() {
        suites "src/test/resources/Homework21POM.xml"
    }
}